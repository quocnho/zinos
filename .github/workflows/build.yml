name: Build BamOS

on:
  schedule:
    - cron: "00 06 * * *"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:
    inputs:
      build_iso:
        description: "Generate ISOs after build"
        type: boolean
        default: false
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: quay.io
  IMAGE_NAMESPACE: quocnho
  R2_PUBLIC_URL: https://dl.bamos.info
  FEDORA_VERSION: 44

jobs:
  # ── Job 1: Build & push 6 container images (3 DE × 2 GPU) ──────────────────
  build-images:
    name: ${{ matrix.edition.name }}${{ matrix.nvidia && '-nvidia' || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        edition:
          - name: bamos-kde
            recipe: bamos-kde.yml
          - name: bamos-gnome
            recipe: bamos-gnome.yml
          - name: bamos-cosmic
            recipe: bamos-cosmic.yml
        nvidia: [false, true]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore podman cache
        uses: actions/cache@v4
        with:
          path: /var/lib/containers/storage
          key: podman-${{ matrix.edition.name }}-${{ matrix.nvidia }}-${{ hashFiles('files/scripts/*.sh', 'recipes/*.yml', 'files/system/**', 'files/kde-system/**', 'files/gnome-system/**', 'files/cosmic-system/**', '.github/workflows/build.yml') }}
          restore-keys: |
            podman-${{ matrix.edition.name }}-${{ matrix.nvidia }}-
            podman-${{ matrix.edition.name }}-

      - name: Set IMAGE_NAME
        run: |
          NAME="${{ matrix.edition.name }}${{ matrix.nvidia && '-nvidia' || '' }}"
          echo "IMAGE_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Built image: ${NAME}"

      - name: Login to Quay.io
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          echo "$QUAY_TOKEN" | sudo podman login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Build Custom Image
        id: build
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.edition.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry: ${{ env.IMAGE_REGISTRY }}
          registry_namespace: ${{ env.IMAGE_NAMESPACE }}
          registry_username: ${{ secrets.QUAY_USERNAME }}
          registry_token: ${{ secrets.QUAY_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

      - name: Retag and push as quay.io/${{ env.IMAGE_NAMESPACE }}/bamos:<name>
        run: |
          NAME="${{ matrix.edition.name }}${{ matrix.nvidia && '-nvidia' || '' }}"
          EDITION="${NAME#bamos-}"
          SRC="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${NAME}:latest"
          DST="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bamos:${EDITION}"
          # Tag locally (no pull needed — image is already in local storage)
          sudo podman tag "$SRC" "$DST"
          sudo podman push "$DST"
          echo "Pushed $DST"

  # ── Job 2: Generate ISOs ──────────────────────────────────────────────────
  build-isos:
    if: |
      always() && (
        (github.event_name == 'schedule') ||
        (github.event_name == 'workflow_dispatch' && inputs.build_iso == true) ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, '[iso]'))
      )
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        edition:
          - name: bamos-kde
            iso-label: BamOS-KDE
          - name: bamos-kde-nvidia
            iso-label: BamOS-KDE-NVIDIA
          - name: bamos-gnome
            iso-label: BamOS-GNOME
          - name: bamos-gnome-nvidia
            iso-label: BamOS-GNOME-NVIDIA
          - name: bamos-cosmic
            iso-label: BamOS-COSMIC
          - name: bamos-cosmic-nvidia
            iso-label: BamOS-COSMIC-NVIDIA
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false

      - name: Login to Quay.io
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          if [ -z "$QUAY_TOKEN" ]; then echo "⚠️ QUAY_TOKEN not set"; exit 1; fi
          echo "$QUAY_TOKEN" | sudo podman login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Pull and Generate ISO
        run: |
          IMG="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.edition.name }}:latest"
          echo "Pulling $IMG..."
          sudo podman pull "$IMG"

      - name: Generate ISO with Titanoboa
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.edition.name }}:latest
          iso-dest: ${{ github.workspace }}/${{ matrix.edition.iso-label }}-${{ github.ref_name }}-amd64.iso

      - name: Generate checksum
        run: |
          set -eo pipefail
          FILE="${{ matrix.edition.iso-label }}-${{ github.ref_name }}-amd64.iso"
          if [ ! -f "$FILE" ]; then echo "ERROR: ISO not found"; ls -la *.iso; exit 1; fi
          sha256sum "$FILE" | tee "CHECKSUM-${{ matrix.edition.iso-label }}.txt"
          if [ ! -s "CHECKSUM-${{ matrix.edition.iso-label }}.txt" ]; then
            echo "ERROR: Checksum empty!"; exit 1
          fi

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.edition.iso-label }}-iso
          path: |
            ${{ github.workspace }}/${{ matrix.edition.iso-label }}-*.iso
            ${{ github.workspace }}/CHECKSUM-${{ matrix.edition.iso-label }}.txt
          retention-days: 7
          compression-level: 0

  # ── Job 3: Notification (schedule only) ───────────────────────────────────
  notify:
    if: always() && github.event_name == 'schedule'
    needs: [build-images, build-isos]
    runs-on: ubuntu-latest
    steps:
      - name: Build notification
        id: notify
        env:
          IMAGES: ${{ needs.build-images.result }}
          ISOS: ${{ needs.build-isos.result }}
        run: |
          if [[ "$IMAGES" == "success" && "$ISOS" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "subject=✅ BamOS Build Thành Công" >> "$GITHUB_OUTPUT"
          elif [[ "$IMAGES" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "subject=✅ BamOS Images Built (ISO skipped)" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "subject=❌ BamOS Build Thất Bại" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.notify.outputs.subject }}
          to: quocnho@gmail.com
          from: BamOS CI
          body: |
            📋 Chi tiết build:
            - Images: ${{ needs.build-images.result }}
            - ISOs: ${{ needs.build-isos.result }}

            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ${{ needs.build-isos.result == 'success' && '📥 Tải ISOs mới nhất: ${{ env.R2_PUBLIC_URL }}' || '' }}

            ---
            BamOS CI

  # ── Job 4: Release to GitHub Releases + R2 ───────────────────────────────
  release:
    if: always() && needs.build-isos.result == 'success'
    needs: build-isos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: iso-artifacts
          merge-multiple: true

      - name: List ISOs
        id: iso-info
        run: |
          echo "### Danh sách ISO" > /tmp/iso-list.txt
          echo "" >> /tmp/iso-list.txt
          TOTAL=0
          for f in iso-artifacts/*.iso; do
            NAME=$(basename "$f" .iso)
            SIZE=$(ls -lh "$f" | awk '{print $5}')
            BYTES=$(ls -l "$f" | awk '{print $5}')
            TOTAL=$((TOTAL + BYTES))
            echo "- **${NAME}** → ${SIZE}" >> /tmp/iso-list.txt
          done
          echo "" >> /tmp/iso-list.txt
          echo "**Tổng: $(numfmt --to=iec $TOTAL 2>/dev/null || echo "${TOTAL} bytes")**" >> /tmp/iso-list.txt
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/iso-list.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: "BamOS Nightly ($(date +%Y-%m-%d))"
          body: |
            ## BamOS Nightly Build

            Automated build from commit ${{ github.sha }}

            ### Danh sách ISO:

            ${{ steps.iso-info.outputs.list }}
          files: iso-artifacts/*
          prerelease: true
          make_latest: true

      - name: Upload to R2 (new first, then delete old)
        id: r2-upload
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rclone
          rclone config create r2 s3 \
            provider Cloudflare \
            access_key_id $R2_ACCESS_KEY_ID \
            secret_access_key $R2_SECRET_ACCESS_KEY \
            region auto \
            endpoint $R2_ENDPOINT
          # Upload new ISOs FIRST, then delete old ones (no downtime)
          rclone copy iso-artifacts r2:bamos-iso --verbose
          rclone delete r2:bamos-iso --include "*.iso" --exclude "*-latest.iso" --verbose 2>/dev/null || true
          rclone delete r2:bamos-iso --include "CHECKSUM-*.txt" --exclude "*-latest.txt" --verbose 2>/dev/null || true

      - name: Create stable download links on R2
        run: |
          for f in iso-artifacts/*.iso; do
            BASENAME=$(basename "$f" .iso)
            # Extract clean edition name: BamOS-KDE-main-amd64 → BamOS-KDE
            EDITION=$(echo "$BASENAME" | sed -E 's/-(nightly-[0-9]+|main|develop|master)-amd64$//')
            EDITION_LOWER=$(echo "$EDITION" | tr '[:upper:]' '[:lower:]')

            echo "📦 Stable:  ${EDITION}.iso → $(basename $f)"
            echo "📦 Latest:  ${EDITION_LOWER}-latest.iso → $(basename $f)"

            # 1. Clean edition URL: https://dl.bamos.info/BamOS-KDE.iso
            rclone copyto "$f" "r2:bamos-iso/${EDITION}.iso" --verbose

            # 2. Latest alias: https://dl.bamos.info/bamos-kde-latest.iso
            rclone copyto "$f" "r2:bamos-iso/${EDITION_LOWER}-latest.iso" --verbose
          done
          for f in iso-artifacts/CHECKSUM-*.txt; do
            BASENAME=$(basename "$f" .txt)
            EDITION=$(echo "$BASENAME" | sed -E 's/-(nightly-[0-9]+|main|develop|master)$//')
            EDITION_LOWER=$(echo "$EDITION" | tr '[:upper:]' '[:lower:]')

            rclone copyto "$f" "r2:bamos-iso/${EDITION}.txt" --verbose
            rclone copyto "$f" "r2:bamos-iso/${EDITION_LOWER}-latest.txt" --verbose
          done

      - name: Print download URLs
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║   BamOS ISO Download URLs            ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "🔗 R2 Public:  ${{ env.R2_PUBLIC_URL }}"
          echo ""
          for f in iso-artifacts/*.iso; do
            BASENAME=$(basename "$f" .iso)
            EDITION=$(echo "$BASENAME" | sed -E 's/-(nightly-[0-9]+|main|develop|master)-amd64$//')
            echo "  📥 ${{ env.R2_PUBLIC_URL }}/${EDITION}.iso"
          done
          echo ""
          echo "🐙 GitHub Releases: https://github.com/${{ github.repository }}/releases/tag/nightly-${{ github.run_id }}"

      - name: Send release email
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🎉 BamOS ISOs đã sẵn sàng!"
          to: quocnho@gmail.com
          from: BamOS CI
          body: |
            🎉 BamOS ISOs ready!

            ${{ steps.iso-info.outputs.list }}

            📥 Tải trực tiếp (luôn phiên bản mới nhất):
            ${{ env.R2_PUBLIC_URL }}/BamOS-KDE.iso
            ${{ env.R2_PUBLIC_URL }}/BamOS-KDE-NVIDIA.iso
            ${{ env.R2_PUBLIC_URL }}/BamOS-GNOME.iso
            ${{ env.R2_PUBLIC_URL }}/BamOS-GNOME-NVIDIA.iso
            ${{ env.R2_PUBLIC_URL }}/BamOS-COSMIC.iso
            ${{ env.R2_PUBLIC_URL }}/BamOS-COSMIC-NVIDIA.iso

            🐙 GitHub Releases:
            https://github.com/${{ github.repository }}/releases/tag/nightly-${{ github.run_id }}

            🔗 Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            BamOS CI
