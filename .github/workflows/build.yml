name: Build BamOS

on:
  schedule:
    # 17:00 UTC = 00:00 GMT+7, Thứ 5 → Thứ 6
    - cron: "00 17 * * 4"
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:
    inputs:
      build_iso:
        description: "Generate ISOs after build"
        type: boolean
        default: false
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ghcr.io/quocnho

jobs:
  # ── Job 1: Build & push 6 container images ───────────────────────────────────
  build-images:
    name: Build ${{ matrix.recipe }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        recipe:
          - bamos-kde.yml
          - bamos-kde-nvidia.yml
          - bamos-gnome.yml
          - bamos-gnome-nvidia.yml
          - bamos-cosmic.yml
          - bamos-cosmic-nvidia.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  # ── Job 2: Generate ISOs (weekly or manual) ─────────────────────────────────
  build-isos:
    if: >
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_iso == 'true')
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        edition:
          - name: bamos-kde
            iso-label: BamOS-KDE
          - name: bamos-kde-nvidia
            iso-label: BamOS-KDE-NVIDIA
          - name: bamos-gnome
            iso-label: BamOS-GNOME
          - name: bamos-gnome-nvidia
            iso-label: BamOS-GNOME-NVIDIA
          - name: bamos-cosmic
            iso-label: BamOS-COSMIC
          - name: bamos-cosmic-nvidia
            iso-label: BamOS-COSMIC-NVIDIA
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false

      - name: Set lower-case registry
        id: registry
        run: echo "lowercase=${IMAGE_REGISTRY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate ISO with Titanoboa
        uses: Zeglius/titanoboa@revamp-pr
        with:
          image-ref: ${{ steps.registry.outputs.lowercase }}/${{ matrix.edition.name }}:latest
          livesys: "true"
          compression: squashfs
          iso-dest: ${{ github.workspace }}/${{ matrix.edition.iso-label }}-${{ github.ref_name }}-amd64.iso

      - name: Generate checksum
        run: |
          cd ${{ github.workspace }}
          sha256sum *.iso | tee CHECKSUM-${{ matrix.edition.iso-label }}.txt

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.edition.iso-label }}-iso
          path: |
            ${{ github.workspace }}/${{ matrix.edition.iso-label }}-*.iso
            ${{ github.workspace }}/CHECKSUM-${{ matrix.edition.iso-label }}.txt
          retention-days: 7
          compression-level: 0

  # ── Job 3: Notify build status via email ──────────────────────────────────
  notify:
    if: always() && github.event_name == 'schedule'
    needs: [build-images, build-isos]
    runs-on: ubuntu-latest
    steps:
      - name: Send build summary email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "BamOS Build - Images: ${{ needs.build-images.result }} / ISO: ${{ needs.build-isos.result }}"
          to: quocnho@gmail.com
          from: BamOS CI
          body: |
            BamOS Weekly Build Report

            Images (GHCR): ${{ needs.build-images.result }}
            ISOs (R2 + Release): ${{ needs.build-isos.result }}

            Commit: ${{ github.sha }}
            Run: ${{ github.run_id }}

            Downloads: https://github.com/${{ github.repository }}/releases
            Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            BamOS CI

  # ── Job 4: Release to GitHub Releases + Cloudflare R2 ───────────────────
  release:
    if: always() && needs.build-isos.result == 'success'
    needs: build-isos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all ISO artifacts
        uses: actions/download-artifact@v4
        with:
          path: iso-artifacts
          merge-multiple: true

      - name: Upload to Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rclone
          rclone config create r2 s3 \
            provider Cloudflare \
            access_key_id $R2_ACCESS_KEY_ID \
            secret_access_key $R2_SECRET_ACCESS_KEY \
            region auto \
            endpoint $R2_ENDPOINT

          rclone delete r2:bamos-iso --include "*.iso" --verbose
          rclone delete r2:bamos-iso --include "CHECKSUM-*.txt" --verbose 2>/dev/null || true
          rclone copy iso-artifacts r2:bamos-iso --verbose
          echo "All ISOs uploaded to Cloudflare R2."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: "BamOS Nightly ($(date +%Y-%m-%d))"
          body: |
            ## BamOS Nightly Build

            Automated build from commit ${{ github.sha }}

            ### Editions:
            - BamOS KDE
            - BamOS KDE NVIDIA
            - BamOS GNOME
            - BamOS GNOME NVIDIA
            - BamOS COSMIC
            - BamOS COSMIC NVIDIA

            > ⚠️ Nightly builds may contain unstable changes.
          files: iso-artifacts/*
          prerelease: true
          make_latest: true

      - name: Send ISO release email
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "BamOS ISOs Ready - ${{ github.run_id }}"
          to: quocnho@gmail.com
          from: BamOS CI
          body: |
            BamOS ISOs are ready!

            All 6 editions built and uploaded.

            Download: https://github.com/${{ github.repository }}/releases/tag/nightly-${{ github.run_id }}
            Browse all: https://github.com/${{ github.repository }}/releases

            ---
            BamOS CI
