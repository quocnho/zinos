# BamOS Linux — GRUB branding configuration
#
# This file is sourced by /etc/default/grub and overrides the default
# Fedora/ublue boot menu branding with BamOS identity.
#
# To apply after changes:
#   sudo grub2-mkconfig -o /boot/grub2/grub.cfg
# (On atomic systems this is done automatically during image build.)

# ── Boot menu entry name ────────────────────────────────────────────────────
GRUB_DISTRIBUTOR="BamOS Linux"

# ── Timeout ─────────────────────────────────────────────────────────────────
GRUB_TIMEOUT=5
GRUB_TIMEOUT_STYLE=menu

# ── Terminal & graphics ─────────────────────────────────────────────────────
GRUB_TERMINAL_OUTPUT=gfxterm
GRUB_GFXMODE=auto
GRUB_GFXPAYLOAD_LINUX=keep

# ── Boot arguments ──────────────────────────────────────────────────────────
GRUB_CMDLINE_LINUX_DEFAULT="quiet rhgb"

# ── Theme (optional — set to a custom GRUB theme path when available) ───────
# GRUB_THEME="/usr/share/grub/themes/bamos/theme.txt"

# ── Disable submenu ─────────────────────────────────────────────────────────
# Show all entries on the main menu for simplicity.
GRUB_DISABLE_SUBMENU=true

# ── Background image (optional ─ place a 1920×1080 PNG at the path below) ──
# GRUB_BACKGROUND="/usr/share/backgrounds/bamos/bamos-grub.png"

# ── Menu colours ────────────────────────────────────────────────────────────
GRUB_COLOR_NORMAL="light-gray/black"
GRUB_COLOR_HIGHLIGHT="\#00bfff/black"
