# BamOS Linux — Dracut configuration
#
# Controls initramfs generation for the BamOS atomic Linux image.
# Ensures the Plymouth boot splash and essential kernel modules are
# included in the initial ramdisk.

# ── Plymouth boot splash ────────────────────────────────────────────────────
# Include the BamOS theme in the initramfs so the splash is visible early.
add_dracutmodules+=" plymouth "
plymouth_theme="bamos"

# ── Storage & filesystem modules ────────────────────────────────────────────
# Ensure overlayfs and LVM (if used by atomic deployments) are available early.
add_drivers+=" overlay "

# ── Network (for remote unlock / network-based root) ────────────────────────
# Enable if you use disk encryption with network unlocking (NBDE/Clevis).
# omit_drivers+=" network "

# ── Early microcode ─────────────────────────────────────────────────────────
# Include CPU microcode updates for both Intel and AMD.
early_microcode="yes"

# ── Compression ─────────────────────────────────────────────────────────────
# Use zstd for faster initramfs decompression (kernel 5.9+).
compress="zstd"

# ── Host-only mode ──────────────────────────────────────────────────────────
# Build a host-specific initramfs for smaller size and faster boot.
# On a generic image, set to "no" so it works across different hardware.
hostonly="no"

# ── Persistent device naming ────────────────────────────────────────────────
# Use persistent device names (by-path/by-uuid) for root device detection.
persistent_policy="by-uuid"
