# BamOS GameMode configuration — based on Bazzite gaming philosophy
# GameMode optimizes the system for gaming by:
#   - Setting CPU governor to performance
#   - Increasing I/O priority
#   - Disabling screensaver/power saving
#   - Pin gaming threads to preferred cores

[general]
# Renice game processes to this priority level (-20 = highest)
renice=10

# Enable realtime scheduling for game processes
softrealtime=auto

# Release cached memory before launching the game
releasemem=enable

# Set CPU governor to 'performance' when game runs
desiredgov=performance

# Threshold for ioprio (I/O priority boost)
ioprio=0

# Inhibit screensaver
inhibit-screensaver=auto

# Disable mitigations (can improve gaming performance on some CPUs)
# WARNING: Only enable if you understand the security implications
# disable-mitigations=false

[filter]
# Whitelist of processes to NOT apply GameMode optimizations
# (These are background tasks that should stay low-priority)
; Don't GameMode file indexers
; Don't GameMode system updaters
; Don't GameMode system daemons

[cpu]
# CPU governor to use (auto, performance, powersave, ondemand, etc.)
gov=performance

# Energy Performance Preference (0=performance, 15=max power saving)
energy_performance_preference=performance

[gpu]
# Apply GPU optimizations when GameMode is active
apply_gpu_optimisations=accept-responsibility
gpu_device=0
# AMD only: set power_dpm_force_performance_level to high
amd_performance_level=high

# NVIDIA only: set PowerMizer to prefer maximum performance
nvidia_powermizer_level=1

[supervisor]
# Supervise and auto-kill processes that are not games
supervisor=whitelist
