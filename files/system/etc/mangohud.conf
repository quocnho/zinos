# BamOS MangoHud configuration — gaming performance overlay
# Available on both AMD/Intel and NVIDIA variants
# Toggle with Shift+F12

no_display=false
toggle_hud=Shift_F12

# Performance
fps_limit=0
fps=1
fps_sampling_period=500
frame_timing=0

# CPU
cpu_stats=1
cpu_temp=1
cpu_mhz=1
cpu_power=0
cpu_load_value=total

# GPU
gpu_stats=1
gpu_temp=1
gpu_core_clock=1
gpu_mem_clock=1
gpu_load_value=core
gpu_power=0
vram=1
vram_bar=0

# Memory
ram=1
ram_bar=0

# Wine/Proton
wine=winehud
fps_color_change=1

# Layout
position=top-left
offset_x=10
offset_y=10
background_alpha=0.5
round_corners=5

# Colors
text_color=FFFFFF
background_color=000000
alpha=0.5
