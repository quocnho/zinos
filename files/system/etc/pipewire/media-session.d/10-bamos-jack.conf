# BamOS JACK Audio Configuration — for professional DAWs like REAPER, Ardour
# PipeWire's JACK client emulates a JACK server, enabling JACK-aware apps
# to run without a separate JACK daemon.
#
# Configure JACK bridge for low-latency operation

jack.properties = {
    # ── Buffer settings ────────────────────────────────────────────────────────
    node.rate     = 48000
    node.period   = 256
    node.latency  = 256/48000
    node.quantum  = 256

    # ── JACK client name ───────────────────────────────────────────────────────
    node.name     = "bamos-jack-bridge"
    node.nick     = "BamOS JACK Bridge"
    media.class   = "Audio/Sink"
}

# ── Connect JACK audio to PipeWire automatically ──────────────────────────────
# Ensures that JACK applications (REAPER, Ardour, etc.) route through PipeWire
# without manual configuration.
jack.rules = [
    {
        matches = [
            { node.name = "~jack*" }
            { node.name = "~JACK*" }
        ]
        actions = {
            update-props = {
                priority.session = 1500
                session.suspend-timeout-seconds = 0
            }
        }
    }
]
