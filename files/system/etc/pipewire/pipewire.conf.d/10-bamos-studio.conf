# BamOS Audio Configuration — Professional Studio & Recording
# Based on PipeWire + WirePlumber with low-latency tuning
# Reference: GLF-OS creation.nix, Bazzite audio config

context.properties = {
    # ── Low-latency tuning for recording ───────────────────────────────────────
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 192000 ]
    default.clock.quantum       = 256
    default.clock.min-quantum   = 32
    default.clock.max-quantum   = 8192

    # ── Real-time scheduling ───────────────────────────────────────────────────
    settings.check-quantum      = false
    settings.check-rate         = false
}

context.modules = [
    {   name = libpipewire-module-rt
        args = {
            nice.level    = -11
            rt.prio       = 88
            rt.time.soft  = -1
            rt.time.hard  = -1
        }
        flags = [ ifexists nofail ]
    }
    {   name = libpipewire-module-protocol-native }
    {   name = libpipewire-module-client-node }
    {   name = libpipewire-module-adapter }
    {   name = libpipewire-module-metadata }
]

# ── Custom filter chain for studio monitors ──────────────────────────────────
# Provides equalization, compression, and limiting for recording/monitoring
context.modules += [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "BamOS Studio Limiter"
            media.name       = "BamOS Studio Limiter"
            filter.graph = {
                nodes = [
                    {   type  = builtin
                        name  = limiter
                        label = "limiter"
                        control = {
                            attack  = 5.0
                            release = 50.0
                            limit   = -1.0
                        }
                    }
                ]
            }
            capture.props = {
                node.name   = "effect_input.studio-limiter"
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                node.name   = "effect_output.studio-limiter"
                audio.position = [ FL FR ]
                node.passive = true
            }
        }
    }
]
