# BamOS vkBasalt configuration — post-processing layer for games
# Based on Bazzite's vkBasalt setup
#
# vkBasalt adds CAS (Contrast Adaptive Sharpening), FXAA, SMAA, and more
# to any Vulkan game.
# Toggle with the key set in toggleKey (default: Home).

effects = cas

# CAS (Contrast Adaptive Sharpening)
cas.contrast = 0.5
cas.sharpness = 0.5
cas.denoise = 0.0

# Toggle key (Home by default)
toggleKey = Home

# Development logging
# devLog = true
# devLogFile = /tmp/vkBasalt.log
