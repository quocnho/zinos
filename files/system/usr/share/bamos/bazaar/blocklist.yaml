blocklists:
  - priority: 0
    block:
    - io.github.kolunmi.Bazaar
    - com.valvesoftware.Steam
    - net.lutris.Lutris
    - io.neovim.nvim
    - org.vim.Vim

  - priority: 0
    conditions:
      - match-envvar:
          var: XDG_CURRENT_DESKTOP
          regex: GNOME
    block:
    - app.devsuite.Ptyxis

  - priority: 0
    conditions:
      - match-envvar:
          var: XDG_CURRENT_DESKTOP
          regex: KDE
    block:
    - org.kde.dolphin
    - org.kde.konsole
    - org.kde.kate
    - org.kde.kwrite
