<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Bamboo stalk -->
  <rect x="248" y="80" width="16" height="280" rx="4" fill="url(#stem)"/>

  <!-- Bamboo nodes -->
  <rect x="244" y="140" width="24" height="8" rx="3" fill="#009624"/>
  <rect x="244" y="220" width="24" height="8" rx="3" fill="#009624"/>
  <rect x="244" y="300" width="24" height="8" rx="3" fill="#009624"/>

  <!-- Left leaf -->
  <path d="M256 160 Q200 130 160 150 Q200 155 256 160Z" fill="#69f0ae" opacity="0.8"/>
  <path d="M256 180 Q210 160 180 175 Q210 185 256 180Z" fill="#69f0ae" opacity="0.6"/>

  <!-- Right leaf -->
  <path d="M256 200 Q310 170 350 190 Q310 195 256 200Z" fill="#69f0ae" opacity="0.8"/>
  <path d="M256 220 Q305 200 340 215 Q305 225 256 220Z" fill="#69f0ae" opacity="0.6"/>

  <!-- B letter (stylized) on bamboo -->
  <text x="256" y="400" font-family="sans-serif" font-size="120" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="central">B</text>
</svg>
