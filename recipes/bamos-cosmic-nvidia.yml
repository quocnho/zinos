name: bamos-cosmic-nvidia
description: BamOS COSMIC Edition with NVIDIA GPU support

base-image: ghcr.io/ublue-os/cosmic-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: files
    files:
      - source: cosmic-system
        destination: /

  - type: script
    scripts:
      - 00-build-setup.sh

  - type: script
    scripts:
      - 01-install-packages.sh

  - type: script
    scripts:
      - 03-nvidia-setup.sh

  - type: script
    scripts:
      - 02-post-build.sh

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - org.mozilla.firefox

  - type: signing
