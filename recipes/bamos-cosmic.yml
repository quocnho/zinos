name: bamos-cosmic
description: BamOS COSMIC Edition — Next-gen desktop from System76

base-image: ghcr.io/ublue-os/base-main
image-version: ${FEDORA_VERSION:-44}

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: files
    files:
      - source: cosmic-system
        destination: /

  - type: script
    scripts:
      - 00-repos.sh
      - 01-kernel.sh
      - 02-packages.sh
      - 03-nvidia.sh

  - type: script
    scripts:
      - 10-de-packages.sh

  - type: script
    scripts:
      - 20-post-build.sh

  - type: signing
