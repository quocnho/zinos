name: bamos-gnome
description: BamOS GNOME Edition — Minimal Atomic Fedora

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: files
    files:
      - source: gnome-system
        destination: /

  - type: script
    scripts:
      - 00-build-setup.sh

  - type: script
    scripts:
      - 01-install-packages.sh

  - type: script
    scripts:
      - 02-post-build.sh

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - org.mozilla.firefox

  - type: signing
